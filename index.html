<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TopSchool — Mes Formations</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0c14;
    --surface: #111520;
    --surface2: #181d2e;
    --border: rgba(255,255,255,0.07);
    --accent: #4f8eff;
    --accent2: #7c5cfc;
    --gold: #f5c842;
    --green: #2dce89;
    --red: #f75a5a;
    --text: #e8eaf2;
    --muted: #6b7494;
    --radius: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND FX ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(79,142,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 85% 100%, rgba(124,92,252,0.10) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,20,0.88);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
  }

  .logo-wrap {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(79,142,255,0.35);
  }

  .header-text h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header-text p  { font-size: 11px; color: var(--muted); font-weight: 400; }

  .user-badge {
    margin-left: auto;
    background: rgba(45,206,137,0.12);
    border: 1px solid rgba(45,206,137,0.25);
    color: var(--green);
    font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── MAIN ── */
  main { position: relative; z-index: 1; padding: 20px 16px 32px; }

  /* ── GREETING ── */
  .greeting {
    margin-bottom: 24px;
    padding: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    position: relative; overflow: hidden;
  }
  .greeting::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .greeting h2 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .greeting h2 span { color: var(--accent); }
  .greeting p  { font-size: 13px; color: var(--muted); }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 12px; font-weight: 600;
    color: var(--muted); letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 12px; margin-top: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  /* ── CATEGORY GRID ── */
  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; gap: 8px;
    text-align: left;
  }
  .cat-card::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(79,142,255,0.08), transparent);
    opacity: 0; transition: opacity 0.18s;
  }
  .cat-card:active { transform: scale(0.96); border-color: var(--accent); }
  .cat-card:active::after { opacity: 1; }
  .cat-card.active {
    border-color: var(--accent);
    background: rgba(79,142,255,0.08);
    box-shadow: 0 0 0 1px rgba(79,142,255,0.3), 0 6px 20px rgba(79,142,255,0.15);
  }

  .cat-icon { font-size: 26px; line-height: 1; }
  .cat-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .cat-count {
    font-size: 11px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .cat-arrow {
    position: absolute; top: 14px; right: 14px;
    color: var(--muted); font-size: 14px;
    transition: transform 0.18s, color 0.18s;
  }
  .cat-card.active .cat-arrow { transform: rotate(90deg); color: var(--accent); }

  /* ── COURS LIST ── */
  .cours-list { display: flex; flex-direction: column; gap: 10px; }

  .cours-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    text-decoration: none; color: inherit;
    cursor: pointer;
    transition: all 0.18s ease;
    animation: slideIn 0.25s ease both;
  }
  .cours-card:active { transform: scale(0.98); border-color: var(--accent2); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cours-thumb {
    width: 44px; height: 44px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(124,92,252,0.25);
  }

  .cours-info { flex: 1; min-width: 0; }
  .cours-title {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .cours-meta { font-size: 11px; color: var(--muted); }

  .cours-btn {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(79,142,255,0.3);
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 48px 24px;
    color: var(--muted);
  }
  .empty .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── LOADING ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 48px;
    color: var(--muted); flex-direction: column; gap: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR BANNER ── */
  .error-banner {
    background: rgba(247,90,90,0.1);
    border: 1px solid rgba(247,90,90,0.25);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px; color: var(--red);
    text-align: center; margin: 12px 0;
  }

  /* ── ACCESS DENIED ── */
  .denied {
    background: var(--surface);
    border: 1px solid rgba(247,90,90,0.2);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
  }
  .denied .lock { font-size: 52px; margin-bottom: 14px; }
  .denied h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--red); }
  .denied p  { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .denied .contact {
    margin-top: 16px;
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(247,90,90,0.1); border: 1px solid rgba(247,90,90,0.2);
    color: var(--red); font-size: 13px; font-weight: 600;
    padding: 10px 18px; border-radius: 10px; text-decoration: none;
  }

  /* ── FADE SECTIONS ── */
  .fade-in { animation: fadeIn 0.3s ease both; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">📚</div>
  <div class="header-text">
    <h1>TopSchool</h1>
    <p>Centre de Formation</p>
  </div>
  <div class="user-badge" id="userBadge">...</div>
</header>

<main id="app">
  <div class="loading">
    <div class="spinner"></div>
    <span style="font-size:13px">Chargement...</span>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG — Remplacer par vos vraies valeurs Supabase
// ═══════════════════════════════════════════════════
const SUPABASE_URL    = 'https://VOTRE_PROJET.supabase.co';
const SUPABASE_ANON   = 'VOTRE_ANON_KEY';
const N8N_WEBHOOK_URL = 'https://VOTRE_N8N/webhook/topschool';

// ═══════════════════════════════════════════════════
//  TELEGRAM INIT
// ═══════════════════════════════════════════════════
const tg      = window.Telegram?.WebApp;
const tgUser  = tg?.initDataUnsafe?.user;
const telegramId = tgUser?.id;
const prenom     = tgUser?.first_name || 'Apprenant';

if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0c14');
  tg.setBackgroundColor('#0a0c14');
}

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let userData   = null;
let categories = [];
let allCours   = [];
let activeCategory = null;

// ═══════════════════════════════════════════════════
//  SUPABASE FETCH HELPERS
// ═══════════════════════════════════════════════════
async function sbFetch(table, params = '') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json'
    }
  });
  if (!r.ok) throw new Error(`Supabase error: ${r.status}`);
  return r.json();
}

// ═══════════════════════════════════════════════════
//  INIT — Charge utilisateur + données
// ═══════════════════════════════════════════════════
async function init() {
  document.getElementById('userBadge').textContent = prenom;
  try {
    // 1. Vérif utilisateur
    const users = await sbFetch('utilisateurs', `telegram_id=eq.${telegramId}&select=*`);

    if (!users.length || users[0].statut !== 'actif') {
      renderDenied();
      return;
    }
    userData = users[0];

    // 2. Charger catégories & cours
    const [cats, cours] = await Promise.all([
      sbFetch('categories', 'select=*&order=ordre'),
      sbFetch('cours', `utilisateur_id=eq.${userData.id}&select=*`)
    ]);
    categories = cats;
    allCours   = cours;

    renderMain();
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="error-banner">⚠️ Erreur de connexion. Vérifiez votre réseau.<br><small>${e.message}</small></div>`;
  }
}

// ═══════════════════════════════════════════════════
//  RENDER — Page principale
// ═══════════════════════════════════════════════════
function renderMain() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="greeting fade-in">
      <h2>👋 Bonjour, <span>${prenom}</span> !</h2>
      <p>Accédez à vos formations ci-dessous.</p>
    </div>

    <div class="section-title">Catégories</div>
    <div class="cat-grid" id="catGrid"></div>

    <div id="coursSection"></div>
  `;
  renderCategories();
}

function renderCategories() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = categories.map(cat => {
    const count = allCours.filter(c => c.code_formation === cat.code).length;
    return `
    <button class="cat-card${activeCategory === cat.code ? ' active' : ''}"
            onclick="selectCategory('${cat.code}')">
      <span class="cat-icon">${cat.icone || '📂'}</span>
      <span class="cat-name">${cat.nom}</span>
      <span class="cat-count">${count} cours</span>
      <span class="cat-arrow">›</span>
    </button>`;
  }).join('');
}

function selectCategory(code) {
  if (activeCategory === code) {
    activeCategory = null;
    renderCategories();
    document.getElementById('coursSection').innerHTML = '';
    return;
  }
  activeCategory = code;
  renderCategories();
  renderCours(code);
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function renderCours(code) {
  const list = allCours.filter(c => c.code_formation === code);
  const section = document.getElementById('coursSection');
  const cat = categories.find(c => c.code === code);

  if (!list.length) {
    section.innerHTML = `<div class="empty"><span class="emoji">📭</span><p>Aucun cours disponible pour cette catégorie.</p></div>`;
    return;
  }

  section.innerHTML = `
    <div class="section-title fade-in">${cat?.icone || '📚'} ${cat?.nom || code}</div>
    <div class="cours-list fade-in" id="coursList"></div>
  `;

  const cl = document.getElementById('coursList');
  cl.innerHTML = list.map((cours, i) => `
    <a class="cours-card" href="${cours.lien}" target="_blank"
       style="animation-delay:${i * 0.06}s"
       onclick="trackOpen('${cours.id}')">
      <div class="cours-thumb">🎬</div>
      <div class="cours-info">
        <div class="cours-title">${cours.titre}</div>
        <div class="cours-meta">${cours.duree || 'Vidéo de formation'}</div>
      </div>
      <div class="cours-btn">▶</div>
    </a>
  `).join('');

  // Smooth scroll
  setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function renderDenied() {
  document.getElementById('app').innerHTML = `
    <div class="denied fade-in">
      <div class="lock">🔒</div>
      <h3>Accès refusé</h3>
      <p>Votre abonnement est expiré ou introuvable.<br>
      Contactez le concepteur pour renouveler votre accès.</p>
      <a href="tel:0656371202" class="contact">📞 0656 37 12 02</a>
    </div>
  `;
}

// ═══════════════════════════════════════════════════
//  TRACKING (optionnel — appel webhook n8n)
// ═══════════════════════════════════════════════════
function trackOpen(coursId) {
  fetch(N8N_WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'open_cours', cours_id: coursId, telegram_id: telegramId })
  }).catch(() => {});
}

// ═══════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════
init();
</script>
</body>
</html>

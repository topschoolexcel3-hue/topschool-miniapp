<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TopSchool — Mes Formations</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

:root{
  --bg:#0a0c14; --s1:#111520; --s2:#181d2e;
  --brd:rgba(255,255,255,0.07);
  --acc:#4f8eff; --acc2:#7c5cfc;
  --grn:#2dce89; --red:#f75a5a;
  --txt:#e8eaf2; --mut:#6b7494;
  --r:16px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Sora',sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%,rgba(79,142,255,.13) 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 85% 100%,rgba(124,92,252,.10) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,12,20,.93);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--brd);
  padding:0 18px;height:56px;
  display:flex;align-items:center;gap:12px;
}
.logo{
  width:38px;height:38px;border-radius:11px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(79,142,255,.35);
}
.logo-txt h1{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo-txt p{font-size:10px;color:var(--mut)}
.badge{
  margin-left:auto;
  background:rgba(45,206,137,.12);
  border:1px solid rgba(45,206,137,.25);
  color:var(--grn);font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;
  max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── MAIN ── */
main{position:relative;z-index:1;padding:18px 16px 40px}

/* ── GREETING ── */
.greet{
  margin-bottom:20px;padding:16px 18px;
  background:var(--s1);border:1px solid var(--brd);
  border-radius:var(--r);position:relative;overflow:hidden;
}
.greet::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--acc),var(--acc2));
}
.greet h2{font-size:18px;font-weight:800;margin-bottom:3px}
.greet h2 span{color:var(--acc)}
.greet p{font-size:12px;color:var(--mut)}

/* ── SECTION LABEL ── */
.lbl{
  font-size:11px;font-weight:600;color:var(--mut);
  letter-spacing:1.2px;text-transform:uppercase;
  margin-bottom:10px;margin-top:4px;
  display:flex;align-items:center;gap:8px;
}
.lbl::after{content:'';flex:1;height:1px;background:var(--brd)}

/* ── CAT GRID ── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.cat{
  background:var(--s1);border:1px solid var(--brd);
  border-radius:var(--r);padding:14px 12px;
  cursor:pointer;transition:all .18s;
  display:flex;flex-direction:column;gap:6px;
  text-align:left;width:100%;
  position:relative;overflow:hidden;
}
.cat:active,.cat.on{
  border-color:var(--acc);background:rgba(79,142,255,.08);
  box-shadow:0 0 0 1px rgba(79,142,255,.3),0 6px 18px rgba(79,142,255,.14);
}
.cat-ico{font-size:24px;line-height:1}
.cat-nm{font-size:12.5px;font-weight:600;line-height:1.3}
.cat-cnt{font-size:10px;color:var(--mut);font-family:'JetBrains Mono',monospace}
.cat-arr{
  position:absolute;top:12px;right:12px;
  color:var(--mut);font-size:15px;
  transition:transform .18s,color .18s;
}
.cat.on .cat-arr{transform:rotate(90deg);color:var(--acc)}

/* ── COURS LIST ── */
.cours-list{display:flex;flex-direction:column;gap:9px}
.cours{
  background:var(--s2);border:1px solid var(--brd);
  border-radius:12px;padding:12px 14px;
  display:flex;align-items:center;gap:13px;
  text-decoration:none;color:inherit;
  animation:up .25s ease both;
  transition:all .15s;
}
.cours:active{transform:scale(.97);border-color:var(--acc2)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.cours-thumb{
  width:42px;height:42px;border-radius:9px;
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 4px 10px rgba(124,92,252,.25);
}
.cours-info{flex:1;min-width:0}
.cours-title{
  font-size:12.5px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:2px;
}
.cours-meta{font-size:10.5px;color:var(--mut)}
.cours-play{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;flex-shrink:0;
  box-shadow:0 4px 10px rgba(79,142,255,.3);
}

/* ── STATES ── */
.spin-wrap{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 20px;gap:14px;color:var(--mut);font-size:13px;
}
.spinner{
  width:34px;height:34px;
  border:3px solid var(--brd);border-top-color:var(--acc);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.denied{
  background:var(--s1);border:1px solid rgba(247,90,90,.2);
  border-radius:var(--r);padding:32px 20px;text-align:center;
  margin-top:12px;
}
.denied .ico{font-size:50px;margin-bottom:12px}
.denied h3{font-size:17px;font-weight:700;color:var(--red);margin-bottom:8px}
.denied p{font-size:12.5px;color:var(--mut);line-height:1.65}
.denied a{
  margin-top:16px;display:inline-flex;align-items:center;gap:6px;
  background:rgba(247,90,90,.1);border:1px solid rgba(247,90,90,.2);
  color:var(--red);font-size:13px;font-weight:600;
  padding:10px 18px;border-radius:10px;text-decoration:none;
}

.err-box{
  background:rgba(247,90,90,.08);border:1px solid rgba(247,90,90,.2);
  border-radius:12px;padding:24px 18px;text-align:center;
  color:var(--red);font-size:13px;line-height:1.75;margin-top:12px;
}
.err-box .eico{font-size:34px;display:block;margin-bottom:10px}
.err-detail{font-size:10.5px;opacity:.5;margin-top:6px;font-family:'JetBrains Mono',monospace;word-break:break-all}
.retry{
  margin-top:14px;
  background:var(--acc);color:#fff;border:none;border-radius:9px;
  padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:'Sora',sans-serif;
}

.empty{text-align:center;padding:40px;color:var(--mut)}
.empty span{font-size:40px;display:block;margin-bottom:10px}

.fade{animation:fadeIn .3s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<header>
  <div class="logo">📚</div>
  <div class="logo-txt"><h1>TopSchool</h1><p>Centre de Formation</p></div>
  <div class="badge" id="badge">...</div>
</header>

<main id="app">
  <div class="spin-wrap"><div class="spinner"></div><span>Chargement...</span></div>
</main>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG — Supabase (clé publishable = safe côté client)
// ═══════════════════════════════════════════════════
const SB_URL = 'https://fpjhfwkthujyromafjqd.supabase.co';
const SB_KEY = 'sb_publishable_WCcpNpZNGYwZiHQse2JkIg_vNgxyWBj';

// ═══════════════════════════════════════════════════
//  TELEGRAM INIT
// ═══════════════════════════════════════════════════
const tg   = window.Telegram?.WebApp;
const tgU  = tg?.initDataUnsafe?.user;
const TID  = String(tgU?.id || 'demo');
const NOM  = tgU?.first_name || 'Apprenant';

if (tg) { tg.ready(); tg.expand(); }
document.getElementById('badge').textContent = NOM;

let CATS = [], COURS = [], ACT = null;

// ═══════════════════════════════════════════════════
//  SUPABASE REST
// ═══════════════════════════════════════════════════
async function sb(table, qs) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, {
    headers:{
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json'
    }
  });
  if (!r.ok) throw new Error(`Supabase ${table} → HTTP ${r.status}`);
  return r.json();
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
async function init() {
  try {
    // 1. Vérifier utilisateur
    const users = await sb('utilisateurs', `telegram_id=eq.${TID}&select=id,prenom,statut`);
    const u = users[0];

    if (!u || u.statut !== 'actif') {
      renderDenied();
      return;
    }

    // 2. Charger catégories + cours en parallèle
    const [cats, cours] = await Promise.all([
      sb('categories', 'select=code,nom,icone,ordre&order=ordre'),
      sb('cours', `utilisateur_id=eq.${u.id}&select=code_formation,titre,lien,duree,ordre&order=ordre`)
    ]);

    CATS  = cats;
    COURS = cours;
    renderMain(u.prenom || NOM);

  } catch(e) {
    renderErr(e.message);
  }
}

// ═══════════════════════════════════════════════════
//  RENDUS
// ═══════════════════════════════════════════════════
function renderMain(nom) {
  document.getElementById('app').innerHTML = `
    <div class="greet fade">
      <h2>👋 Bonjour, <span>${nom}</span> !</h2>
      <p>Sélectionnez une catégorie pour accéder à vos formations.</p>
    </div>
    <div class="lbl">Catégories</div>
    <div class="cat-grid" id="cats"></div>
    <div id="cours-sec"></div>`;
  drawCats();
}

function drawCats() {
  document.getElementById('cats').innerHTML = CATS.map(c => {
    const n = COURS.filter(x => x.code_formation === c.code).length;
    return `<button class="cat${ACT===c.code?' on':''}" onclick="pick('${c.code}')">
      <span class="cat-ico">${c.icone||'📂'}</span>
      <span class="cat-nm">${c.nom}</span>
      <span class="cat-cnt">${n} cours</span>
      <span class="cat-arr">›</span>
    </button>`;
  }).join('');
}

function pick(code) {
  ACT = ACT===code ? null : code;
  drawCats();
  const sec = document.getElementById('cours-sec');
  if (!ACT) { sec.innerHTML=''; return; }
  const list = COURS.filter(c => c.code_formation===code);
  const cat  = CATS.find(c => c.code===code);
  if (!list.length) {
    sec.innerHTML='<div class="empty"><span>📭</span><p>Aucun cours disponible.</p></div>';
    return;
  }
  sec.innerHTML = `
    <div class="lbl fade">${cat?.icone||'📚'} ${cat?.nom||code}</div>
    <div class="cours-list fade">
      ${list.map((c,i)=>`
        <a class="cours" href="${c.lien}" target="_blank" style="animation-delay:${i*.06}s">
          <div class="cours-thumb">🎬</div>
          <div class="cours-info">
            <div class="cours-title">${c.titre}</div>
            <div class="cours-meta">${c.duree||'Vidéo de formation'}</div>
          </div>
          <div class="cours-play">▶</div>
        </a>`).join('')}
    </div>`;
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),80);
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function renderDenied() {
  document.getElementById('app').innerHTML = `
    <div class="denied fade">
      <div class="ico">🔒</div>
      <h3>Accès refusé</h3>
      <p>Votre abonnement est expiré ou introuvable.<br>Contactez Mr Bouafia Rehabi pour renouveler.</p>
      <a href="tel:0656371202">📞 0656 37 12 02</a>
    </div>`;
}

function renderErr(msg) {
  document.getElementById('app').innerHTML = `
    <div class="err-box fade">
      <span class="eico">⚠️</span>
      <strong>Erreur de chargement</strong>
      <div class="err-detail">${msg}</div>
      <button class="retry" onclick="init()">🔄 Réessayer</button>
    </div>`;
}

init();
</script>
</body>
</html>
